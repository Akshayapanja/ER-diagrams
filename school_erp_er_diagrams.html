const tabs=document.getElementById('tabs');
const wrap=document.getElementById('erd-wrap');
let current=null;

async function showDomain(d,btn){
  document.querySelectorAll('.dbt').forEach(b=>{
    b.classList.remove('on');
    b.style.background='transparent';
    b.style.color='var(--color-text-secondary)';
    b.style.borderColor='var(--color-border-secondary)';
  });
  btn.classList.add('on');
  btn.style.background=d.color;
  btn.style.color='#fff';
  btn.style.borderColor=d.color;
  wrap.innerHTML='<div style="padding:2rem;text-align:center;color:var(--color-text-tertiary);font-size:13px">Rendering diagram…</div>';
  try{
    const uid='erd-'+d.id+'-'+Date.now();
    const {svg}=await mermaid.render(uid, d.diagram);
    wrap.innerHTML=svg;
    const s=wrap.querySelector('svg');
    if(s){
      s.style.width='100%';
      s.style.height='auto';
      s.style.maxWidth='100%';
      s.removeAttribute('height');
    }
    postProcess(wrap);
  }catch(e){
    wrap.innerHTML='<div style="padding:1rem;color:var(--color-text-danger);font-size:12px">Error: '+e.message+'</div>';
  }
}

function postProcess(container){
  container.querySelectorAll('.node,.er.entityBox').forEach(node=>{
    const firstPath=node.querySelector('path[d],rect');
    if(!firstPath)return;
    if(firstPath.tagName==='rect'){
      firstPath.setAttribute('rx','8');
      firstPath.setAttribute('ry','8');
    }
  });
  container.querySelectorAll('path[d]').forEach(p=>{
    const d2=p.getAttribute('d')||'';
    const nums=d2.match(/-?[\d.]+/g)?.map(Number);
    if(!nums||nums.length<8)return;
    const xs=[nums[0],nums[2],nums[4],nums[6]];
    const ys=[nums[1],nums[3],nums[5],nums[7]];
    if(xs.some(isNaN)||ys.some(isNaN))return;
    const x=Math.min(...xs),y=Math.min(...ys);
    const w=Math.max(...xs)-x,h=Math.max(...ys)-y;
    if(w<10||h<10)return;
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',x);rect.setAttribute('y',y);
    rect.setAttribute('width',w);rect.setAttribute('height',h);
    rect.setAttribute('rx','8');
    for(const a of['fill','stroke','stroke-width','class','style']){
      if(p.hasAttribute(a))rect.setAttribute(a,p.getAttribute(a));
    }
    p.replaceWith(rect);
  });
  container.querySelectorAll('.row-rect-odd path,.row-rect-even path,.row-rect-odd rect,.row-rect-even rect').forEach(p=>{
    p.setAttribute('stroke','none');
  });
}

DOMAINS.forEach((d,i)=>{
  const btn=document.createElement('button');
  btn.className='dbt';
  btn.textContent=d.label;
  btn.onclick=()=>showDomain(d,btn);
  tabs.appendChild(btn);
  if(i===0)setTimeout(()=>btn.click(),100);
});
